name: Deploy Managed Application

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Azure CLI
        uses: azure/setup-cli@v1

      - name: Login to Azure
        run: az login --service-principal -u ${{ secrets.AZURE_CLIENT_ID }} -p ${{ secrets.AZURE_CLIENT_SECRET }} --tenant ${{ secrets.AZURE_TENANT_ID }}

      - name: Deploy Managed Application
        run: az managedapp create --location eastus --managed-app-definition-id "/subscriptions/<subscription-id>/resourceGroups/<resource-group>/providers/Microsoft.Solutions/managedApplications/MyManagedApp" --parameters "@templates/managed-app-template.json"
